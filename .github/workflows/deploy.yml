name: Build & Deploy
on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  APP: common

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Definir nome da imagem (lowercase)
        id: img
        run: echo "image=ghcr.io/${{ github.repository_owner }}/$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:latest
            ${{ steps.img.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy no K3s via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ steps.img.outputs.image }}:${{ github.sha }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USE_SSL: ${{ secrets.DB_USE_SSL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE,DB_HOST,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD,DB_USE_SSL,JWT_SECRET
          script: /usr/local/bin/deploy-arenagamer.sh ${{ env.APP }} "$IMAGE"
