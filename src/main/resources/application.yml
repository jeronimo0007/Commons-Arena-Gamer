spring:
  application:
    name: arenagamer-common

  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:6MB}

  datasource:
    # Defina DB_URL para controle total, OU apenas DB_HOST/DB_PORT/DB_NAME (mais simples).
    url: ${DB_URL:jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:arenagamer}?useSSL=${DB_USE_SSL:false}&serverTimezone=${DB_TIMEZONE:UTC}&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&connectTimeout=10000&socketTimeout=30000}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    # Migrações são de responsabilidade do arenagamer-auth (dono do schema no banco compartilhado).
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    # Banco vazio ou Perfex sem histórico Flyway: baseline na v1 e aplica V1_1 em diante.
    # Banco Perfex existente: V1_1 usa IF NOT EXISTS; V2+ cria/altera só o que falta.
    baseline-on-migrate: true
    baseline-version: 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

  cache:
    type: redis
    redis:
      time-to-live: 600000

server:
  port: ${SERVER_PORT:8082}

# Integração com o Perfex CRM (callback para criação de faturas de créditos).
# A compra de créditos SEMPRE gera uma fatura no Perfex; o saldo só é creditado
# após o pagamento (via hook do módulo Perfex -> /admin/wallet/.../deposit).
arenagamer:
  # Armazenamento de imagens em bucket S3-compatible (DigitalOcean Spaces, AWS S3, MinIO...).
  # Para migrar de provedor, basta trocar endpoint/region/bucket e as credenciais.
  storage:
    enabled: ${STORAGE_ENABLED:false}
    provider: ${STORAGE_PROVIDER:digitalocean}
    endpoint: ${STORAGE_ENDPOINT:}
    region: ${STORAGE_REGION:us-east-1}
    bucket: ${STORAGE_BUCKET:}
    access-key: ${STORAGE_ACCESS_KEY:}
    secret-key: ${STORAGE_SECRET_KEY:}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:}
    key-prefix: ${STORAGE_KEY_PREFIX:uploads}
    acl: ${STORAGE_ACL:public-read}
    path-style-access: ${STORAGE_PATH_STYLE:false}
    max-file-size: ${STORAGE_MAX_FILE_SIZE:5242880}
  perfex:
    base-url: ${PERFEX_BASE_URL:http://localhost/perfex_crm}
    # Deve ser idêntico à option `arenagamer_internal_secret` exibida em
    # ArenaGamer > Configurações no painel do Perfex.
    internal-secret: ${PERFEX_INTERNAL_SECRET:}
    credit-invoice-path: ${PERFEX_CREDIT_INVOICE_PATH:/arenagamer/internal/credit_invoice}

# JWT
jwt:
  secret: ${JWT_SECRET:arenaGamerSecretKey2024SuperSecureKeyThatIsLongEnough256bits!!}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:3600}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800}

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    urls-primary-name: Todos

# RabbitMQ Queues
mq:
  queue:
    payment-processing: payment.processing.queue
    bracket-generation: bracket.generation.queue
    notification: notification.queue
  exchange:
    arenagamer: arenagamer.exchange
  routing-key:
    payment: payment.processing
    bracket: bracket.generation
    notification: notification.send

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
  level:
    root: INFO
    com.arenagamer: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
